<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Page not found — Dani Asyrofi</title>
<meta name="description" content="This page does not exist. Head back home." />
<meta name="robots" content="noindex, follow" />
<meta name="theme-color" content="#faf8f3" media="(prefers-color-scheme: light)" />
<meta name="theme-color" content="#0e0d0b" media="(prefers-color-scheme: dark)" />
<meta name="color-scheme" content="light dark" />

<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg" />
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
<link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300..500&family=Geist+Mono:wght@400..500&display=swap" rel="stylesheet" />

<style>
:root {
  --bg: #faf8f3;
  --ink: #141210;
  --ink-2: #3a342e;
  --ink-muted: #696157;
  --ink-subtle: #a39b90;
  --accent: #8b3a1e;
  --line: rgba(20, 18, 16, 0.08);
  --ff-serif: "Instrument Serif", Georgia, serif;
  --ff-sans: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --ff-mono: "Geist Mono", ui-monospace, "SF Mono", monospace;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #0e0d0b;
    --ink: #f4efe4;
    --ink-2: #c9c1b3;
    --ink-muted: #908778;
    --ink-subtle: #5c5449;
    --accent: #d98e6c;
    --line: rgba(244, 239, 228, 0.08);
  }
}
[data-theme="dark"] {
  --bg: #0e0d0b;
  --ink: #f4efe4;
  --ink-2: #c9c1b3;
  --ink-muted: #908778;
  --ink-subtle: #5c5449;
  --accent: #d98e6c;
  --line: rgba(244, 239, 228, 0.08);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { color-scheme: light dark; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: var(--ff-sans);
  font-size: 16px;
  line-height: 1.55;
  letter-spacing: -0.003em;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100dvh;
  display: grid;
  place-items: center;
  padding: 40px;
}

.wrap {
  max-width: 560px;
  text-align: center;
}

.code {
  font-family: var(--ff-mono);
  font-size: 11px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-subtle);
  margin-bottom: 40px;
  display: inline-flex;
  align-items: center;
  gap: 10px;
}
.code::before {
  content: "";
  width: 24px;
  height: 1px;
  background: currentColor;
  opacity: 0.6;
}

h1 {
  font-family: var(--ff-serif);
  font-weight: 400;
  font-style: italic;
  font-size: clamp(72px, 12vw, 144px);
  line-height: 0.95;
  letter-spacing: -0.03em;
  color: var(--ink);
  margin-bottom: 24px;
}
h1 em { color: var(--accent); font-style: italic; }

.deck {
  font-family: var(--ff-serif);
  font-size: clamp(22px, 3vw, 32px);
  line-height: 1.25;
  color: var(--ink-2);
  margin-bottom: 16px;
  letter-spacing: -0.01em;
}

p {
  color: var(--ink-muted);
  margin-bottom: 40px;
  max-width: 46ch;
  margin-left: auto;
  margin-right: auto;
  font-size: 15px;
}

.actions {
  display: inline-flex;
  gap: 24px;
  align-items: center;
  flex-wrap: wrap;
  justify-content: center;
}

a.back {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: 12px 20px 12px 22px;
  background: var(--ink);
  color: var(--bg);
  border-radius: 999px;
  font-size: 14px;
  font-weight: 450;
  letter-spacing: -0.005em;
  text-decoration: none;
  transition: transform 200ms var(--ease-out), opacity 200ms var(--ease-out);
}
a.back:hover { transform: translateY(-1px); opacity: 0.92; }
a.back svg { width: 14px; height: 14px; }

a.sec {
  color: var(--ink-muted);
  text-decoration: none;
  font-size: 14px;
  border-bottom: 1px solid transparent;
  transition: color 200ms var(--ease-out), border-color 200ms var(--ease-out);
}
a.sec:hover { color: var(--ink); border-bottom-color: var(--line); }

footer {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%);
  font-family: var(--ff-mono);
  font-size: 10.5px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-subtle);
}
footer .dot {
  display: inline-block;
  width: 6px;
  height: 6px;
  background: var(--accent);
  border-radius: 50%;
  margin: 0 8px;
  vertical-align: middle;
}

@media (prefers-reduced-motion: reduce) {
  * { transition: none !important; animation: none !important; }
}
</style>
</head>
<body>
<main class="wrap">
  <div class="code">ERROR 404 · PAGE NOT FOUND</div>
  <h1>Nothing <em>here.</em></h1>
  <p class="deck">The page you were looking for does not exist, or has moved.</p>
  <p>Perhaps it was an exploration that never saw the light. Or a case study still in drafts. Head back to safer ground.</p>
  <div class="actions">
    <a href="/" class="back" aria-label="Back to homepage">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to home
    </a>
    <a href="mailto:hello@daniasyrofi.com" class="sec">Report a broken link</a>
  </div>
</main>
<footer>DANIASYROFI.COM<span class="dot"></span>JAKARTA</footer>
</body>
</html>
