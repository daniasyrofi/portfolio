# Netlify configuration for daniasyrofi.com

[build]
  publish = "."

# Pretty URL redirects (301, always)
[[redirects]]
  from = "/medium"
  to = "https://daniasyrofi.medium.com"
  status = 301
  force = true

[[redirects]]
  from = "/dribbble"
  to = "https://dribbble.com/daniasyrofi"
  status = 301
  force = true

[[redirects]]
  from = "/linkedin"
  to = "https://linkedin.com/in/daniasyrofi"
  status = 301
  force = true

[[redirects]]
  from = "/github"
  to = "https://github.com/daniasyrofi"
  status = 301
  force = true

[[redirects]]
  from = "/cv"
  to = "/index.html"
  status = 200

# Custom 404 fallback for unmatched paths
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404

# Security headers on every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), interest-cohort=()"
    X-XSS-Protection = "1; mode=block"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Content-Security-Policy = "default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; script-src 'self' 'unsafe-inline'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

# Cache HTML briefly so edits go live fast
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache static assets aggressively
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml"
    Cache-Control = "public, max-age=3600"

# Shadcn-compatible registry. Served with CORS so the shadcn CLI
# (and any mirror) can fetch from any origin.
[[headers]]
  for = "/r/*"
  [headers.values]
    Content-Type = "application/json; charset=utf-8"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, OPTIONS"
    Cache-Control = "public, max-age=300, s-maxage=3600"
